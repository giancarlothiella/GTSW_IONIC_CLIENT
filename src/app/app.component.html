<ion-app>
  <ion-router-outlet></ion-router-outlet>

  <!-- Global AI Chat Component (triggered by gridSetAIMode / formAIAssist actions) -->
  <app-gts-ai-chat
    [(visible)]="aiChatVisible"
    [config]="aiChatConfig"
    (visibleChange)="onAiChatVisibleChange($event)"
    (dataReceived)="onAiDataReceived($event)">
  </app-gts-ai-chat>

  <!-- Global AI Analyzer Component (triggered by showAIAnalyzer action) -->
  <app-gts-ai-analyzer
    [(visible)]="aiAnalyzerVisible"
    [data]="aiAnalyzerData"
    [config]="aiAnalyzerConfig"
    [analyzerCode]="aiAnalyzerCode"
    (visibleChange)="onAiAnalyzerVisibleChange($event)">
  </app-gts-ai-analyzer>

  <!-- Global Excel Uploader (triggered by uploadExcel action) -->
  <app-gts-excel-uploader
    [request]="excelUploadRequest"
    (uploaded)="onExcelUploaded($event)"
    (closed)="onExcelUploaderClosed()">
  </app-gts-excel-uploader>
</ion-app>
